# ---------------------------------------------------------------------------
# Test configuration: process ONLY a single subfolder of inputs/checking.
# Useful to iterate quickly during development without processing everything.
#
# Run with:  python main.py --config config/test_config.yaml
# ---------------------------------------------------------------------------

input_root: "inputs/checking"
output_root: "output"
logs_root: "logs"
misc_root: "misc"

# Only this folder is processed. Change it to any subfolder under inputs/checking.
target_folder: "PI 292174"
process_all_folders: false

skip_existing: true
overwrite_existing: false

enable_segmentation: true
document_rules_path: "config/document_rules.yaml"

use_gpu: true
device: "gpu:0"

log_level: "INFO"
log_to_console: true

accepted_extensions:
  - ".png"
  - ".jpg"
  - ".jpeg"
  - ".pdf"
  - ".doc"
  - ".docx"
  - ".odt"

paddleocr:
  pipeline: "PPStructureV3"

page_images:
  enabled: true
  output_folder_name: "page_images"
  render_dpi: 300
  image_format: "png"
  validate_against_paddle_json_size: true
  allow_box_scaling: true
  suspicious_panel_ratio: 2.5

tesseract:
  enabled: true
  executable_path: "tesseract"
  language: "por+eng"
  psm: 7
  oem: 1
  timeout_seconds_per_box: 10
  save_box_crops: true
  save_box_json: true
  crop_padding_px: 0
  allow_padding_for_debug: false

fusion:
  enabled: true
  strategy: "select_highest_confidence_per_box"
  tie_margin: 0.03
  tie_breaker: "paddleocr"
  keep_alternatives: true
  mark_conflicts: true
  conflict_text_similarity_max: 0.6
