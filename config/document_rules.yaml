# ---------------------------------------------------------------------------
# Document classification rules for the post-OCR segmentation stage (Option B).
#
# The classifier (src/page_classifier.py) loads this file via
# src/document_rules.py. NOTHING here is hard-coded in Python: adjust terms and
# thresholds freely without touching code.
#
# Scoring (v1): for each document type, each matched strong_term adds
# `strong_weight` points and each matched weak_term adds `weak_weight` points.
# confidence = points_scored / max_possible_points_for_that_type.
# Terms are matched after normalization (uppercase, accent-free, punctuation
# collapsed), so entries below are written without accents on purpose.
# ---------------------------------------------------------------------------

# Relative weights for term categories (used to compute the max/achieved score).
weights:
  strong: 2.0
  weak: 1.0

thresholds:
  # >= classified            -> status "classified"
  # >= needs_review          -> status "needs_review" (still produced)
  # <  unknown_below         -> status "unknown"
  classified: 0.75
  needs_review: 0.45
  unknown_below: 0.45
  # Minimum own-confidence for a low-scoring page to be eligible as a
  # continuation of the previous document.
  continuation_min_confidence: 0.35

document_types:
  nota_fiscal:
